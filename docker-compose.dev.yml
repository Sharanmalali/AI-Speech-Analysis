# =============================================================================
# AblePro Solutions — Development overrides
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Adds hot-reload, source mounts and direct host port exposure for the API
# and the Next.js dev server.
# =============================================================================

services:
  backend:
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
    volumes:
      - ./backend:/app
      - ./models:/models:ro
      - backend_storage:/app/storage
    ports:
      - "8000:8000"

  worker:
    command:
      ["celery", "-A", "app.tasks.celery_app", "worker",
       "--loglevel=debug", "--concurrency=1"]
    environment:
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      - ./models:/models:ro
      - backend_storage:/app/storage

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  # Celery monitoring UI (dev convenience).
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks.celery_app", "flower", "--port=5555"]
    env_file: ./backend/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks: [ablepro]
