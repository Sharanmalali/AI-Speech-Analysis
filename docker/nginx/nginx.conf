# =============================================================================
# AblePro Solutions — NGINX reverse proxy
# Routes:  /api/*  -> backend (FastAPI)   |   /*  -> frontend (Next.js)
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    # Allow large audio uploads.
    client_max_body_size 110M;
    client_body_timeout  300s;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml application/wasm;

    # Upstreams (service names resolve on the compose network).
    upstream ablepro_backend {
        server backend:8000;
    }
    upstream ablepro_frontend {
        server frontend:3000;
    }

    # Basic rate-limit zone for the API surface (defence in depth; the app
    # also enforces SlowAPI limits).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # --- Backend API + docs -------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://ablepro_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location ~ ^/(docs|redoc|openapi.json|health|ready) {
            proxy_pass http://ablepro_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Frontend (Next.js) -------------------------------------------
        location / {
            proxy_pass http://ablepro_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
